<!DOCTYPE html>
<html>
<head>
  <title>User Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid">
    <span class="navbar-brand">User Dashboard</span>
  </div>
</nav>

<div class="container mt-4">

  <div id="alertBox" class="alert alert-info d-none" role="alert">
    Click "Load Users" to fetch data.
  </div>

  <input type="text" id="search" class="form-control mb-3" placeholder="Search user...">

  
  <button id="loadBtn" class="btn btn-primary mb-3">Load Users</button>

  <div class="table-responsive">
    <table class="table table-striped table-hover">
      <thead class="table-dark">
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>City</th>
        </tr>
      </thead>
      <tbody id="userTable"></tbody>
    </table>
  </div>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script src="jquery.js"></script>

</body>
</html>
